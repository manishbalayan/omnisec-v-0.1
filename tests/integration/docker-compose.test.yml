services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnisec_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4223:4222"
      - "8223:8222"
    command: ["-js"]

  omnisec:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.all-in-one
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/omnisec_test
      NATS_URL: nats://nats:4222
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "3000:3000"
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
      - DAC_READ_SEARCH
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
