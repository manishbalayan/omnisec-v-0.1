services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnisec_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4223:4222"
      - "8223:8222"
    command: ["-js"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/omnisec_test
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  daemon:
    build:
      context: .
      dockerfile: services/daemon/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/omnisec_test
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chaos-agent:
    build:
      context: .
      dockerfile: crates/chaos/Dockerfile
    command: ["--healthy-loop", "--interval-secs", "1"]
    depends_on:
      - daemon
