# =============================================================================
# OmniSec Docker Image Publishing
# =============================================================================
# Builds the all-in-one Docker image and publishes to Docker Hub.
#
# Triggers:
#   - Push to main branch (publishes as :latest and :git-sha)
#   - Tag push v* (publishes as :latest, :semver, and :git-sha)
#   - Manual trigger via GitHub UI (workflow_dispatch)
#
# To add secrets in GitHub:
#   Settings → Secrets and variables → Actions → New repository secret
#   - DOCKERHUB_USERNAME: your Docker Hub username
#   - DOCKERHUB_TOKEN: your Docker Hub access token (not password)
# =============================================================================

name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: omnisec/omnisec

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Run on larger runner for faster builds (16-core, 64GB RAM)
    # Remove if not using GitHub larger runners
    # runs-on: ubuntu-latest-16-cores

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================================================================
      # Generate Docker metadata tags
      # =========================================================================
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      # =========================================================================
      # Build and push the all-in-one image
      # =========================================================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.all-in-one
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          # Build with all available CPUs
          build-args: |
            CARGO_NET_RETRY=3
          # Uncomment for cross-platform builds:
          # platforms: linux/amd64,linux/arm64

      # =========================================================================
      # Prune cache to avoid unbounded growth
      # =========================================================================
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # =========================================================================
      # Run a quick smoke test
      # =========================================================================
      - name: Smoke test image
        run: |
          docker run --rm -d --name omnisec-smoke-test \
            -p 3000:3000 \
            -v omnisec_smoke:/var/lib/omnisec \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Wait for container's HEALTHCHECK to pass (hits internal API at 127.0.0.1:3002/health)
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' omnisec-smoke-test 2>/dev/null || echo "starting")
            if [ "$HEALTH" = "healthy" ]; then
              echo "Container healthy!"
              break
            fi
            sleep 5
            echo "  ...still waiting ($i)"
          done

          # Verify the container is running and reachable
          curl -sf http://localhost:3000 && echo " Dashboard OK"

          # Clean up
          docker stop omnisec-smoke-test
          docker rm omnisec-smoke-test
          docker volume rm omnisec_smoke
