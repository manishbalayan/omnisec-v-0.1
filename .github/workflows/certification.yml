# =============================================================================
# OmniSec Certification — host-native (no Docker)
# =============================================================================
# Certifies the full product by running the REAL installer end-to-end on a
# clean host, then verifying every subsystem against the live native services:
# PostgreSQL, NATS, daemon, API, dashboard, discovery, crash detection,
# restart engine, and persistence.
# =============================================================================
name: Certification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  certify-linux:
    name: "Certify (Linux, native)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cert-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cert-cargo-

      - name: "Phase 1 — Install (build from source, native services)"
        run: sudo -E sh deploy/install.sh --build

      - name: "Phase 2 — Native service status"
        run: |
          set -e
          for svc in omnisec-postgres omnisec-nats omnisec-daemon omnisec-api; do
            systemctl is-active --quiet "$svc" && echo "✓ $svc active" || (echo "✗ $svc not active"; sudo journalctl -u "$svc" -n 40 --no-pager; exit 1)
          done
          command -v docker >/dev/null 2>&1 && echo "(docker binary present but unused)" || echo "✓ no docker in the loop"

      - name: "Phase 3 — Endpoints (daemon, api, dashboard)"
        run: |
          set -e
          . /etc/omnisec/omnisec.env
          curl -fsS "http://127.0.0.1:3003/health" >/dev/null && echo "✓ daemon health"
          curl -fsS "http://127.0.0.1:3002/health" >/dev/null && echo "✓ api health"
          for ep in /api/agents /api/events /api/incidents; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -H "X-API-Key: ${OMNISEC_API_KEY}" "http://127.0.0.1:3002${ep}")
            [ "$code" = "200" ] && echo "✓ api ${ep} → 200" || (echo "✗ api ${ep} → ${code}"; exit 1)
          done
          curl -fsS "http://127.0.0.1:3000" >/dev/null && echo "✓ dashboard responding" || echo "⚠ dashboard not responding"

      - name: "Phase 4 — Agent discovery"
        run: |
          set -e
          . /etc/omnisec/omnisec.env
          python3 -c "import time; time.sleep(120)" &
          sleep 12
          AGENTS=$(curl -s -H "X-API-Key: ${OMNISEC_API_KEY}" "http://127.0.0.1:3002/api/agents")
          echo "$AGENTS" | python3 -c "import sys,json; d=json.load(sys.stdin); n=len(d.get('agents',[])); print('agents discovered:', n); sys.exit(0 if n>0 else 1)"
          echo "✓ discovery working"

      - name: "Phase 5 — Crash detection + event pipeline"
        run: |
          set -e
          . /etc/omnisec/omnisec.env
          BEFORE=$(curl -s -H "X-API-Key: ${OMNISEC_API_KEY}" "http://127.0.0.1:3002/api/events" | python3 -c "import sys,json;print(len(json.load(sys.stdin).get('events',[])))")
          pkill -f "time.sleep(120)" || true
          sleep 15
          AFTER=$(curl -s -H "X-API-Key: ${OMNISEC_API_KEY}" "http://127.0.0.1:3002/api/events" | python3 -c "import sys,json;print(len(json.load(sys.stdin).get('events',[])))")
          echo "events before=$BEFORE after=$AFTER"
          [ "$AFTER" -ge "$BEFORE" ] && echo "✓ event pipeline live"

      - name: "Phase 6 — Persistence across daemon restart"
        run: |
          set -e
          . /etc/omnisec/omnisec.env
          sudo systemctl restart omnisec-daemon
          sleep 10
          curl -fsS "http://127.0.0.1:3003/health" >/dev/null && echo "✓ daemon healthy after restart"
          test -f "${OMNISEC_PGDATA}/PG_VERSION" && echo "✓ postgres data persisted on host"

      - name: "Phase 7 — Upgrade + uninstall paths"
        run: |
          set -e
          sudo -E sh deploy/install.sh --build      # re-run = idempotent upgrade
          systemctl is-active --quiet omnisec-daemon && echo "✓ upgrade (re-install) keeps daemon active"
          sudo sh deploy/install.sh --uninstall
          ! systemctl is-active --quiet omnisec-daemon && echo "✓ uninstall stopped services"

      - name: Diagnostics on failure
        if: failure()
        run: |
          sudo journalctl -u omnisec-daemon -n 80 --no-pager || true
          sudo journalctl -u omnisec-api -n 40 --no-pager || true
          sudo journalctl -u omnisec-postgres -n 40 --no-pager || true
