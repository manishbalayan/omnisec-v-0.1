# =============================================================================
# OmniSec Daemon Build Pipeline
# =============================================================================
# Builds omnisec-daemon release binaries for:
#   - linux/amd64
#   - linux/arm64
#   - macOS (darwin)/amd64 (Intel)
#   - macOS (darwin)/arm64 (Apple Silicon)
# and publishes to GitHub Releases.
#
# Triggers:
#   - Push to main branch
#   - Tag push v* (uses git tag as release tag)
#   - Manual trigger via GitHub UI (workflow_dispatch)
#
# Binary naming convention: omnisec-daemon-{os}-{arch}
#   Examples:
#     omnisec-daemon-linux-amd64
#     omnisec-daemon-linux-arm64
#     omnisec-daemon-darwin-amd64
#     omnisec-daemon-darwin-arm64
#
# Installer expects binaries WITHOUT os prefix for Linux (default case):
#   omnisec-daemon-amd64  → symlink/copy of omnisec-daemon-linux-amd64
#   omnisec-daemon-arm64  → symlink/copy of omnisec-daemon-linux-arm64
# =============================================================================

name: OmniSec Daemon Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: "Build Daemon (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux AMD64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os_tag: linux
            arch: amd64
            needs_cross: false
          # Linux ARM64
          - os: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu
            os_tag: linux
            arch: arm64
            needs_cross: false
          # macOS Intel (build natively)
          - os: macos-13
            target: x86_64-apple-darwin
            os_tag: darwin
            arch: amd64
            needs_cross: false
          # macOS Apple Silicon (build natively)
          - os: macos-14
            target: aarch64-apple-darwin
            os_tag: darwin
            arch: arm64
            needs_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (latest stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install cross toolchain deps
      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build daemon binary
        run: |
          cd services/daemon
          cargo build --release --bin omnisec-daemon --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: matrix.os_tag == 'linux'
        run: |
          strip target/${{ matrix.target }}/release/omnisec-daemon

      - name: Strip binary (macOS)
        if: matrix.os_tag == 'darwin'
        run: |
          strip target/${{ matrix.target }}/release/omnisec-daemon 2>/dev/null || true

      # Create the final artifact name: omnisec-daemon-{os_tag}-{arch}
      - name: Rename binary for artifact
        run: |
          mkdir -p /tmp/artifacts/${{ matrix.os_tag }}-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/omnisec-daemon \
            /tmp/artifacts/${{ matrix.os_tag }}-${{ matrix.arch }}/omnisec-daemon-${{ matrix.os_tag }}-${{ matrix.arch }}
          # Also create a platform-agnostic alias for Linux (no os_tag prefix)
          # so the installer can use omnisec-daemon-amd64 / omnisec-daemon-arm64
          if [ "${{ matrix.os_tag }}" = "linux" ]; then
            cp target/${{ matrix.target }}/release/omnisec-daemon \
              /tmp/artifacts/${{ matrix.os_tag }}-${{ matrix.arch }}/omnisec-daemon-${{ matrix.arch }}
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnisec-daemon-${{ matrix.os_tag }}-${{ matrix.arch }}
          path: /tmp/artifacts/${{ matrix.os_tag }}-${{ matrix.arch }}/*
          retention-days: 30

  package:
    name: "Package and Release"
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: set_tag
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v0.1.0-daemon"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Organize artifacts
        run: |
          mkdir -p ./release-assets
          # Find and copy all binary files to release-assets/
          find ./artifacts -type f -name 'omnisec-daemon-*' -exec cp {} ./release-assets/ \;
          echo "=== Release assets ==="
          ls -la ./release-assets/

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          for f in omnisec-daemon-*; do
            if [[ ! "$f" =~ \.sha256$ ]]; then
              sha256sum "$f" > "$f.sha256"
              echo "Generated: $f.sha256"
            fi
          done

      - name: Display checksums
        run: |
          echo "=== All Checksums ==="
          cat release-assets/*.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.set_tag.outputs.tag }}
          name: OmniSec Daemon ${{ steps.set_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}