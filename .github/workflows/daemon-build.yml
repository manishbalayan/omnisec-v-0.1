# =============================================================================
# OmniSec Daemon Build Pipeline
# =============================================================================
# Builds omnisec-daemon release binaries for:
#   - linux/amd64   (native ubuntu-24.04)
#   - linux/arm64   (cross-compiled on ubuntu-24.04 via gcc-aarch64-linux-gnu)
#   - darwin/amd64  (native macos-13)
#   - darwin/arm64  (native macos-14)
#
# Triggers: push to main, tag v*, manual dispatch
#
# Binary naming: omnisec-daemon-{os_tag}-{arch}
#   linux also ships arch-only aliases: omnisec-daemon-{arch}
# =============================================================================

name: OmniSec Daemon Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: "Build (${{ matrix.os_tag }}-${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64 — native build
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os_tag: linux
            arch: amd64
            cross: false
            verify_run: true

          # Linux ARM64 — cross-compile on amd64 runner
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            os_tag: linux
            arch: arm64
            cross: true
            verify_run: false   # can't exec arm64 on amd64; use file+size check

          # macOS Intel — native build
          - runner: macos-13
            target: x86_64-apple-darwin
            os_tag: darwin
            arch: amd64
            cross: false
            verify_run: true

          # macOS Apple Silicon — native build
          - runner: macos-14
            target: aarch64-apple-darwin
            os_tag: darwin
            arch: arm64
            cross: false
            verify_run: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross toolchain (Linux cross only)
        if: matrix.cross == true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-build-

      - name: Build release binary
        run: |
          cargo build --release -p omnisec-daemon --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          BINARY="target/${{ matrix.target }}/release/omnisec-daemon"
          if [ "${{ matrix.cross }}" = "true" ]; then
            aarch64-linux-gnu-strip "$BINARY" || true
          else
            strip "$BINARY" 2>/dev/null || true
          fi

      - name: Verify binary — runability check (native targets)
        if: matrix.verify_run == true
        run: |
          BINARY="target/${{ matrix.target }}/release/omnisec-daemon"
          echo "=== Running --version ==="
          "$BINARY" --version
          echo "=== Exit code: $? ==="

      - name: Verify binary — format + size check (cross-compiled targets)
        if: matrix.verify_run == false
        run: |
          BINARY="target/${{ matrix.target }}/release/omnisec-daemon"
          SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY")
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 1048576 ]; then
            echo "ERROR: Binary is too small ($SIZE bytes) — likely a stub"
            exit 1
          fi
          file "$BINARY"
          file "$BINARY" | grep -q "ELF.*ARM aarch64" || {
            echo "ERROR: Not an AArch64 ELF binary"
            exit 1
          }
          echo "OK: AArch64 ELF binary, size ${SIZE} bytes"

      - name: Stage artifact
        run: |
          DIR="/tmp/artifacts/${{ matrix.os_tag }}-${{ matrix.arch }}"
          mkdir -p "$DIR"
          BINARY="target/${{ matrix.target }}/release/omnisec-daemon"
          DEST_NAME="omnisec-daemon-${{ matrix.os_tag }}-${{ matrix.arch }}"
          cp "$BINARY" "$DIR/$DEST_NAME"
          echo "Staged: $DEST_NAME"
          # Linux also ships an arch-only alias for the installer
          if [ "${{ matrix.os_tag }}" = "linux" ]; then
            cp "$BINARY" "$DIR/omnisec-daemon-${{ matrix.arch }}"
            echo "Staged alias: omnisec-daemon-${{ matrix.arch }}"
          fi
          ls -lh "$DIR/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnisec-daemon-${{ matrix.os_tag }}-${{ matrix.arch }}
          path: /tmp/artifacts/${{ matrix.os_tag }}-${{ matrix.arch }}/*
          retention-days: 30

  release:
    name: "Package and Publish Release"
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v0.1.0-dev-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Collect release assets
        run: |
          mkdir -p ./release-assets
          find ./artifacts -type f -name 'omnisec-daemon-*' -exec cp {} ./release-assets/ \;
          echo "=== Release assets ==="
          ls -lh ./release-assets/

      - name: Verify expected binaries are present
        run: |
          EXPECTED=(
            "omnisec-daemon-linux-amd64"
            "omnisec-daemon-linux-arm64"
            "omnisec-daemon-darwin-amd64"
            "omnisec-daemon-darwin-arm64"
            "omnisec-daemon-amd64"
            "omnisec-daemon-arm64"
          )
          MISSING=0
          for NAME in "${EXPECTED[@]}"; do
            if [ -f "release-assets/$NAME" ]; then
              echo "OK: $NAME"
            else
              echo "MISSING: $NAME"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING expected binary/binaries missing from release assets"
            exit 1
          fi

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          for f in omnisec-daemon-*; do
            [[ "$f" =~ \.sha256$ ]] && continue
            sha256sum "$f" > "$f.sha256"
            echo "Checksum: $(cat "$f.sha256")"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "OmniSec Daemon ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
